<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bionic Reader</title>
  <style>
    body { width: 250px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fcfaf8; color: #1c1917; margin: 0; }
    h3 { margin-top: 0; font-size: 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .title-group { display: flex; align-items: center; gap: 8px; }
    button { width: 100%; padding: 10px; margin-top: 10px; cursor: pointer; border: 1px solid #e7e5e4; background: white; border-radius: 8px; font-weight: 500; font-size: 14px; color: #44403c; transition: background 0.2s; }
    button:hover { background: #f5f5f4; }
    
    /* Toggle Switch */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #6366f1; }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>
  <h3>
    <div class="title-group">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>
      Bionic Reader
    </div>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </h3>
  <p style="font-size: 13px; color: #78716c; margin-bottom: 16px;">Improve your reading focus across the web.</p>
  <button id="optionsBtn">Extension Settings</button>
  <script src="popup.js"></script>
</body>
</html>
